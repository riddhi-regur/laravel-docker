version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: php/Dockerfile
    container_name: laravel_app
    volumes:
      - ./app:/var/www/html
    working_dir: /var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: laravel_nginx
    ports:
      - "8000:80"
      - "5173:5173"
    volumes:
      - ./app:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: postgres:17
    container_name: laravel_db
    restart: always
    environment:
      POSTGRES_DB: student-management-app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Sql@123
    ports:
      - "5432:5432"

  pgadmin:
    image: dpage/pgadmin4
    container_name: laravel_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: riddhi.jani@regur.net
      PGADMIN_DEFAULT_PASSWORD: Sql@123
    ports:
      - "5050:80"
    depends_on:
      - db
